<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SideShift AI</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100vw;
        height: 100vh;
        /* Overlay is transparent; individual widgets paint their own surfaces. */
        background: transparent;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      /* Whole overlay is click-through by default; interactive elements opt back in. */
      body { pointer-events: none; }
      .ss-interactive { pointer-events: auto; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/dist-fable/Main.js"></script>
  </body>
</html>
