<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — SideShift AI</title>
  <link rel="stylesheet" href="assets/fonts.css">
  <link rel="stylesheet" href="assets/site.css">
</head>
<body data-page="contact">
<main>
<section class="wrap" style="padding-top:56px">
  <div class="contact-grid">
    <div class="reveal">
      <p class="eyebrow" style="display:inline-block">Get in touch</p>
      <h1 style="font-size:clamp(32px,5vw,52px)">Let us know what you are <span class="grad">shifting</span>.</h1>
      <p class="lede">Feedback, beta access, enterprise questions, or a bug you found. We read everything.</p>
      <form onsubmit="event.preventDefault(); this.querySelector('button').textContent='Thanks. We will reply soon.';">
        <input class="field" type="text" placeholder="Your name" required>
        <input class="field" type="email" placeholder="Email" required>
        <textarea class="field" placeholder="What is on your mind?" required></textarea>
        <button class="btn btn-p" style="margin-top:16px" type="submit">Send message</button>
      </form>
      <div class="socials">
        <a href="https://github.com/babybooghost/sideshift.ai" aria-label="GitHub"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 00-3.16 19.49c.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.9 1.53 2.36 1.09 2.93.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02a9.5 9.5 0 015 0c1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85v2.74c0 .27.18.58.69.48A10 10 0 0012 2z"/></svg></a>
        <a href="mailto:regrettedd@gmail.com" aria-label="Email"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></a>
      </div>
    </div>
    <div class="reveal" style="display:flex;justify-content:center">
      <div id="globe"></div>
    </div>
  </div>
</section>
</main>
<script type="module" src="assets/shell.js"></script>
<script type="module" src="assets/site.js"></script>
</body>
</html>
