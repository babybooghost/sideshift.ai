<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sGold" x1="320" y1="300" x2="700" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8C64C"/>
      <stop offset="1" stop-color="#E68A26"/>
    </linearGradient>
    <linearGradient id="arr" x1="235" y1="720" x2="850" y2="255" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D8481A"/>
      <stop offset="1" stop-color="#F26B2A"/>
    </linearGradient>
  </defs>

  <!-- arrow shaft BEHIND the S -->
  <path d="M 235 712
           C 360 694 388 566 476 546
           C 566 526 560 424 662 402
           C 724 388 780 348 828 286"
        fill="none" stroke="url(#arr)" stroke-width="60" stroke-linecap="round"/>

  <!-- brushstroke S (gold) — the colored subject, transparent bg -->
  <path d="M 705 380
           C 690 300 585 285 505 320
           C 410 362 405 455 505 500
           C 610 548 640 640 560 700
           C 480 752 360 735 320 665"
        fill="none" stroke="url(#sGold)" stroke-width="112"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- arrow leading shaft + head IN FRONT of the S (so it pierces through) -->
  <path d="M 648 410 C 726 388 782 346 828 286"
        fill="none" stroke="url(#arr)" stroke-width="60" stroke-linecap="round"/>
  <!-- arrowhead -->
  <path d="M 862 250 L 776 268 L 820 344 Z" fill="#F26B2A"/>
</svg>
