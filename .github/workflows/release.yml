name: release

# Windows installers can't be built on macOS, so we fan out across native
# runners. Tag push (vX.Y.Z) builds both and publishes a GitHub Release;
# manual runs just produce downloadable artifacts.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            builder: "--mac"
          - os: windows-latest
            builder: "--win"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore Fable tool
        run: dotnet tool restore

      - name: Install deps
        run: npm ci

      - name: Build renderer (Fable + Vite)
        run: npm run build

      - name: Package installer
        run: npx electron-builder ${{ matrix.builder }} --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.blockmap
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
